version: '3'

vars:
  IMAGE: '{{.IMAGE | default "platform/cnpg-plugin-pgdump:latest"}}'
  BIN_DIR: '{{.BIN_DIR | default ".bin"}}'
  SHIKAI: '{{.BIN_DIR}}/shikai'
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev

tasks:
  build:
    cmds:
      - CGO_ENABLED=0 go build -ldflags "-X main.version={{.VERSION}}" -o bin/cnpg-plugin-pgdump .
  test:
    cmds:
      - go test ./...
  e2e:
    vars:
      POSTGRES_VERSIONS: '{{.POSTGRES_VERSIONS | default "16"}}'
      CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "auto"}}'
      E2E_PARALLELISM: '{{.E2E_PARALLELISM | default "2"}}'
    cmds:
      - go test -tags=e2e ./test/e2e -count=1 -timeout=45m -postgres-versions="{{.POSTGRES_VERSIONS}}" -container-runtime="{{.CONTAINER_RUNTIME}}" -parallelism="{{.E2E_PARALLELISM}}"
  fmt:
    cmds:
      - gofmt -w .
  docker-build:
    cmds:
      - docker build --build-arg VERSION={{.VERSION}} -t {{.IMAGE}} .
  install-shikai:
    status:
      - test -x {{.SHIKAI}}
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - GOBIN=$PWD/{{.BIN_DIR}} go install github.com/nicolaiort/shikai@latest
  release:
    deps:
      - install-shikai
    cmds:
      - '{{.SHIKAI}} {{.CLI_ARGS}}'
