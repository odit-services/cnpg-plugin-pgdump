version: '3'

vars:
  IMAGE: '{{.IMAGE | default "platform/cnpg-plugin-pgdump:latest"}}'
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev

tasks:
  build:
    cmds:
      - CGO_ENABLED=0 go build -ldflags "-X main.version={{.VERSION}}" -o bin/cnpg-plugin-pgdump .
  test:
    cmds:
      - go test ./...
  fmt:
    cmds:
      - gofmt -w .
  docker-build:
    cmds:
      - docker build --build-arg VERSION={{.VERSION}} -t {{.IMAGE}} .
