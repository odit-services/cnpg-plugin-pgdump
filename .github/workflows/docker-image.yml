name: Docker image

on:
  push:
    branches:
      - main
    tags:
      - '*.*.*'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render release deployment manifest
        if: startsWith(github.ref, 'refs/tags/')
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.version }}
        run: |
          mkdir -p dist
          image="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          sed "s|image: platform/cnpg-plugin-pgdump:latest|image: ${image}|" \
            kubernetes/deployment.yaml > dist/cnpg-plugin-pgdump-deployment.yaml

      - name: Extract release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          awk -v tag="$tag" -v version="$version" '
            $0 == "### " tag || $0 == "### v" version || $0 == "### " version { capture=1; next }
            capture && /^### / { exit }
            capture { print }
          ' CHANGELOG.md > dist/release-notes.md
          if [ ! -s dist/release-notes.md ]; then
            cp CHANGELOG.md dist/release-notes.md
          fi

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/cnpg-plugin-pgdump-deployment.yaml \
            --title "${GITHUB_REF_NAME}" \
            --notes-file dist/release-notes.md \
            --verify-tag
