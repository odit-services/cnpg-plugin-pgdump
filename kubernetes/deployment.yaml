apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnpg-plugin-pgdump
  namespace: cnpg-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cnpg-plugin-pgdump
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters", "backups"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cnpg-plugin-pgdump
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cnpg-plugin-pgdump
subjects:
  - kind: ServiceAccount
    name: cnpg-plugin-pgdump
    namespace: cnpg-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cnpg-plugin-pgdump
  namespace: cnpg-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cnpg-plugin-pgdump
  template:
    metadata:
      labels:
        app: cnpg-plugin-pgdump
    spec:
      serviceAccountName: cnpg-plugin-pgdump
      containers:
        - name: plugin
          image: platform/cnpg-plugin-pgdump:latest
          args:
            - plugin
            - --listen-address=unix:///plugins
          env:
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: backup-s3-credentials
                  key: endpoint
                  optional: true
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backup-s3-credentials
                  key: access-key-id
                  optional: true
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backup-s3-credentials
                  key: secret-access-key
                  optional: true
            - name: S3_REGION
              value: us-east-1
          volumeMounts:
            - name: socket-dir
              mountPath: /plugins
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: socket-dir
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cnpg-plugin-pgdump
  namespace: cnpg-system
spec:
  selector:
    app: cnpg-plugin-pgdump
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
